<div class="container-fluid vh-100 d-flex justify-content-center align-items-center bg-light">
  
  <div class="card p-5 shadow-lg rounded-4 border-0" style="max-width: 450px; width: 100%;">
    
    <div class="text-center mb-5">
      <div class="bg-primary rounded-circle d-inline-flex p-3 mb-3 shadow-sm text-white">
        <i class="bi bi-prescription2" style="font-size: 2rem;"></i>
      </div>
      <h2 class="fw-bold text-primary mb-1">Pharmman</h2>
      <p class="text-muted fs-6">Plataforma de Gestión</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      
      <div class="mb-4">
        <label class="form-label fw-medium text-secondary">Email</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 text-muted">
            <i class="bi bi-envelope"></i>
          </span>
          <input 
            type="email"
            formControlName="email"
            class="form-control border-start-0 ps-0 form-control-lg fs-6" 
            placeholder="correo@pharmman.com">
        </div>
        <small class="text-danger"
          *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Ingresa un email válido
        </small>
      </div>

      <div class="mb-5">
        <div class="d-flex justify-content-between">
          <label class="form-label fw-medium text-secondary">Contraseña</label>
        </div>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 text-muted">
            <i class="bi bi-lock"></i>
          </span>
          <input 
            type="password"
            formControlName="password"
            class="form-control border-start-0 ps-0 form-control-lg fs-6" 
            placeholder="••••••••">
        </div>
        <small class="text-danger"
          *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          La contraseña es requerida
        </small>
      </div>

      <small class="text-danger d-block mb-3 text-center" *ngIf="errorMsg">
        {{ errorMsg }}
      </small>

      <button 
        type="submit" 
        class="btn btn-primary btn-lg w-100 rounded-3 shadow-sm d-flex justify-content-center align-items-center gap-2"
        [disabled]="form.invalid">
        <span>Ingresar</span>
        <i class="bi bi-arrow-right-circle"></i>
      </button>

    </form>
  </div>
</div>
