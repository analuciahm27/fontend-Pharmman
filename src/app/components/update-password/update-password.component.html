<div class="container-fluid vh-100 d-flex justify-content-center align-items-center bg-light">
  <div class="card p-5 shadow-lg rounded-4 border-0" style="max-width:440px; width:100%;">

    <div class="text-center mb-4">
      <div class="icon-lock mx-auto mb-3">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h4 class="fw-bold text-charcoal">Cambio de contraseña obligatorio</h4>
      <p class="text-muted small">Por seguridad, debes establecer una nueva contraseña antes de continuar.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label small fw-bold text-muted">CONTRASEÑA ACTUAL (tu DNI)</label>
        <input type="password" class="form-control" formControlName="passwordActual"
               placeholder="Ingresa tu DNI">
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold text-muted">NUEVA CONTRASEÑA</label>
        <input type="password" class="form-control" formControlName="passwordNueva"
               placeholder="Mínimo 6 caracteres">
        <small class="text-danger"
          *ngIf="form.get('passwordNueva')?.invalid && form.get('passwordNueva')?.touched">
          Mínimo 6 caracteres
        </small>
      </div>
      <div class="mb-4">
        <label class="form-label small fw-bold text-muted">CONFIRMAR CONTRASEÑA</label>
        <input type="password" class="form-control" formControlName="confirmar"
               placeholder="Repite la nueva contraseña">
      </div>

      @if (errorMsg) {
        <div class="alert alert-danger rounded-3 py-2 small mb-3">
          <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMsg }}
        </div>
      }

      <button type="submit" class="btn btn-jungle w-100 py-3 rounded-pill fw-bold"
              [disabled]="form.invalid || loading">
        @if (loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
        Guardar nueva contraseña
      </button>
    </form>
  </div>
</div>
